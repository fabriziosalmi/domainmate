# DomainMate — deployed on the fabgpt-ops LXC at /opt/domainmate
# Port 8422: bound to 127.0.0.1 so only co-located services (fabgpt-ops) can reach it.
# fabgpt-ops calls POST http://127.0.0.1:8422/analyze for on-demand domain enrichment.
services:
  domainmate:
    build: .
    image: domainmate:latest
    container_name: domainmate
    ports:
      - "127.0.0.1:8422:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./reports:/app/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/metrics"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
